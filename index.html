<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
      <div class="container">
      <!-- Login Form -->
      <form id="loginForm">
        <h2>Login</h2>
        <input type="email" placeholder="Email" id="loginEmail" required />
        <input
          type="password"
          id="loginPassword"
          placeholder="Password"
          required
        />
        <button type="submit" id="loginbtn">Login</button>
        <p>Don't have account? <span id="showSignup">Signup</span></p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="hidden">
        <h2>Signup</h2>
        <input type="text" placeholder="Username" required />
        <input type="email" placeholder="Email" id="signupEmail" required />
        <input type="password" placeholder="Password" id="signupPassword" required />
        <button type="submit" id="signupbtn">Signup</button>
        <p>Already have account? <span id="showLogin">Login</span></p>
      </form>
    </div>

    <div class="newdiv">
      <div id="wholecontain">
      <div id="contain">
        <h2>TODO LIST</h2>
        <section class="list">
          <input type="text" id="inputText" placeholder="Enter a task" />
          <button id="addTask">Add List</button>
        </section>
      </div>
    </div>
    <div id="taskContainer"></div>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
